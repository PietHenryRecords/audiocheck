<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Audio RMS Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        header {
            background: #9c0000;
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
        }
        header img {
            height: 50px;
            margin-right: 15px;
        }
        header h1 {
            margin: 0;
            font-size: 24px;
        }
        main {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        .description {
            margin-bottom: 30px;
            color: #333;
            font-size: 16px;
        }
        input[type="file"] {
            margin-bottom: 15px;
        }
        button {
            background-color: #9c0000;
            border: none;
            color: white;
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }
        button:hover {
            background-color: #7a0000;
        }
    </style>
</head>
<body>

<header>
    <img src="https://cdn-icons-png.flaticon.com/512/727/727245.png" alt="Logo">
    <h1>Audio RMS Checker</h1>
</header>

<main>
    <div class="description">
        Prüfe hier schnell und einfach, ob deine Hörbuch-Dateien die korrekte Lautheit (RMS) erfüllen.  
        Lade deine MP3-Dateien hoch und erhalte sofort das Ergebnis.
    </div>

    <form action="/" method="post" enctype="multipart/form-data">
        <input type="file" name="files" multiple required><br>
        <button type="submit">Dateien hochladen und prüfen</button>
    </form>

    {% if reports %}
        <h2>Ergebnisse:</h2>
        {% for report in reports %}
            <div>{{ report }}</div>
        {% endfor %}
        <br>
        <form action="/download" method="get">
            <button type="submit">Ergebnisse als CSV herunterladen</button>
        </form>
    {% endif %}
</main>

</body>
</html>
