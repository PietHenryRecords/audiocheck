<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Audio RMS Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff;
            margin: 0;
            padding: 0;
        }
        header {
            background: #9c0000;
            color: white;
            padding: 20px;
            text-align: center;
        }
        main {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        .description {
            margin-bottom: 30px;
            text-align: center;
        }
        form {
            text-align: center;
            margin-bottom: 30px;
        }
        button {
            background-color: #9c0000;
            border: none;
            color: white;
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }
        button:hover {
            background-color: #7a0000;
        }
        .results-header {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        .result-card {
            background: #f8f8f8;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .status-ok {
            color: green;
            font-weight: bold;
        }
        .status-fail {
            color: red;
            font-weight: bold;
        }
        #loader {
            display: none;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #9c0000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<header>
    <h1>Audio RMS Checker</h1>
</header>

<main>
    <div class="description">
        Prüfe hier schnell und einfach, ob deine Hörbuch-Dateien die korrekte Lautheit (RMS), Sample Rate, Bit-Tiefe und Stereo erfüllen.
        Lade deine MP3- oder WAV-Dateien hoch und erhalte sofort das Ergebnis.
    </div>

    <form id="upload-form" action="/" method="post" enctype="multipart/form-data">
        <input type="file" name="files" multiple required><br>
        <button type="submit">Dateien hochladen und prüfen</button>
    </form>

    <div id="loader"></div>

    <div id="results"></div>
</main>

<script>
    const form = document.getElementById('upload-form');
    const loader = document.getElementById('loader');
    const results = document.getElementById('results');

    form.addEventListener('submit', function() {
        loader.style.display = 'block';
        results.innerHTML = '';
    });

    window.onload = function() {
        if (results.innerHTML.trim() !== '') {
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
