<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Audio RMS Checker</title>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body onload="clearResults()">

    <h1>Audio-Check Upload</h1>

    <input type="file" id="fileInput" multiple>
    <button onclick="uploadFiles()">Dateien hochladen und prüfen</button>

    <h2>Antwort vom Server:</h2>
    <pre id="responseText"></pre>

    <script>
        function clearResults() {
            document.getElementById('responseText').textContent = '';
        }

        async function uploadFiles() {
            const responseText = document.getElementById('responseText');
            responseText.textContent = ''; // Ergebnisse immer leeren

            const files = document.getElementById('fileInput').files;
            if (files.length === 0) {
                responseText.textContent = 'Bitte wählen Sie eine oder mehrere Dateien aus.';
                return;
            }

            const formData = new FormData();
            for (const file of files) {
                formData.append('files', file);
            }

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData,
                    cache: 'no-store'
                });

                if (!response.ok) {
                    throw new Error(`Serverfehler: ${response.statusText}`);
                }

                const result = await response.json();
                responseText.textContent = JSON.stringify(result, null, 2);
            } catch (error) {
                responseText.textContent = `Fehler beim Hochladen: ${error.message}`;
            }
        }
    </script>

</body>
</html>
